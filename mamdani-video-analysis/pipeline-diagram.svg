<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="localGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#0a1a2a"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#1a1f26"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700" letter-spacing="1">Mamdani Video Analysis Pipeline</text>
  <text x="600" y="62" text-anchor="middle" fill="#8b949e" font-size="13">Automated monitoring, processing, and analysis of social media video content</text>

  <!-- ==================== CLOUD SECTION ==================== -->
  <rect x="30" y="80" width="340" height="380" rx="12" fill="url(#cloudGrad)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="80" width="340" height="36" rx="12" fill="#6c63ff" opacity="0.15"/>
  <text x="200" y="104" text-anchor="middle" fill="#b4a7ff" font-size="13" font-weight="600">REMOTE TRIGGER (Anthropic Cloud)</text>
  <text x="200" y="120" text-anchor="middle" fill="#8b949e" font-size="10">Daily at 8:07 AM ET</text>

  <!-- Trigger box -->
  <rect x="60" y="140" width="280" height="44" rx="8" fill="url(#stepGrad)" stroke="#6c63ff" stroke-width="1"/>
  <text x="200" y="158" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">mamdani-video-monitor</text>
  <text x="200" y="174" text-anchor="middle" fill="#8b949e" font-size="10">Claude Sonnet 4.6 remote agent</text>

  <!-- WebFetch boxes -->
  <rect x="60" y="200" width="130" height="40" rx="6" fill="url(#stepGrad)" stroke="#f85149" stroke-width="1"/>
  <text x="125" y="216" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">WebFetch</text>
  <text x="125" y="230" text-anchor="middle" fill="#8b949e" font-size="10">YouTube</text>

  <rect x="210" y="200" width="130" height="40" rx="6" fill="url(#stepGrad)" stroke="#f85149" stroke-width="1"/>
  <text x="275" y="216" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">WebFetch</text>
  <text x="275" y="230" text-anchor="middle" fill="#8b949e" font-size="10">TikTok</text>

  <!-- Compare -->
  <rect x="90" y="256" width="220" height="36" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="278" text-anchor="middle" fill="#e6edf3" font-size="11">Compare against metadata.json</text>

  <!-- Report -->
  <rect x="90" y="308" width="220" height="36" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="330" text-anchor="middle" fill="#e6edf3" font-size="11">Write latest-check.json</text>

  <!-- Push -->
  <rect x="90" y="360" width="220" height="36" rx="6" fill="url(#stepGrad)" stroke="url(#greenGrad)" stroke-width="1"/>
  <text x="200" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Git commit + push</text>

  <!-- Cloud arrows -->
  <line x1="125" y1="184" x2="125" y2="200" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="275" y1="184" x2="275" y2="200" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="125" y1="240" x2="200" y2="256" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="275" y1="240" x2="200" y2="256" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="292" x2="200" y2="308" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="344" x2="200" y2="360" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cloud to Local connector -->
  <path d="M 200 420 L 200 440 Q 200 460 220 460 L 400 460" stroke="#3fb950" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="300" y="452" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">git pull</text>

  <!-- ==================== LOCAL PIPELINE ==================== -->
  <rect x="410" y="80" width="760" height="520" rx="12" fill="url(#localGrad)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="410" y="80" width="760" height="36" rx="12" fill="#2ea043" opacity="0.1"/>
  <text x="790" y="104" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="600">LOCAL PIPELINE (Legion 2025 - RTX 4080 Super)</text>
  <text x="790" y="120" text-anchor="middle" fill="#8b949e" font-size="10">update-pipeline.py | On demand or Windows Task Scheduler</text>

  <!-- Step 1: Download -->
  <rect x="435" y="140" width="160" height="100" rx="8" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <rect x="435" y="140" width="160" height="24" rx="8" fill="#6c63ff" opacity="0.2"/>
  <text x="515" y="157" text-anchor="middle" fill="#b4a7ff" font-size="11" font-weight="700">STEP 1</text>
  <text x="515" y="180" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Download</text>
  <text x="515" y="196" text-anchor="middle" fill="#8b949e" font-size="10">01-download.py</text>
  <text x="515" y="210" text-anchor="middle" fill="#8b949e" font-size="10">yt-dlp | YT + TikTok</text>
  <text x="515" y="228" text-anchor="middle" fill="#484f58" font-size="9">Skips known IDs</text>

  <!-- Step 2: Transcribe -->
  <rect x="620" y="140" width="160" height="100" rx="8" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <rect x="620" y="140" width="160" height="24" rx="8" fill="#6c63ff" opacity="0.2"/>
  <text x="700" y="157" text-anchor="middle" fill="#b4a7ff" font-size="11" font-weight="700">STEP 2</text>
  <text x="700" y="180" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Transcribe</text>
  <text x="700" y="196" text-anchor="middle" fill="#8b949e" font-size="10">02-transcribe.py</text>
  <text x="700" y="210" text-anchor="middle" fill="#f0883e" font-size="10">Whisper turbo | CUDA</text>
  <text x="700" y="228" text-anchor="middle" fill="#484f58" font-size="9">Skips existing .txt</text>

  <!-- Step 3: Frames -->
  <rect x="805" y="140" width="160" height="100" rx="8" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <rect x="805" y="140" width="160" height="24" rx="8" fill="#6c63ff" opacity="0.2"/>
  <text x="885" y="157" text-anchor="middle" fill="#b4a7ff" font-size="11" font-weight="700">STEP 3</text>
  <text x="885" y="180" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Extract frames</text>
  <text x="885" y="196" text-anchor="middle" fill="#8b949e" font-size="10">03-extract-frames.py</text>
  <text x="885" y="210" text-anchor="middle" fill="#8b949e" font-size="10">ffmpeg | 1 per 3 sec</text>
  <text x="885" y="228" text-anchor="middle" fill="#484f58" font-size="9">Skips existing dirs</text>

  <!-- Step 4: Analysis -->
  <rect x="990" y="140" width="160" height="100" rx="8" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <rect x="990" y="140" width="160" height="24" rx="8" fill="#6c63ff" opacity="0.2"/>
  <text x="1070" y="157" text-anchor="middle" fill="#b4a7ff" font-size="11" font-weight="700">STEP 4</text>
  <text x="1070" y="180" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Analyze</text>
  <text x="1070" y="196" text-anchor="middle" fill="#8b949e" font-size="10">04-build-analysis.py</text>
  <text x="1070" y="210" text-anchor="middle" fill="#8b949e" font-size="10">Keyword topic/sentiment</text>
  <text x="1070" y="228" text-anchor="middle" fill="#484f58" font-size="9">Rebuilds all JSON</text>

  <!-- Step arrows -->
  <line x1="595" y1="190" x2="620" y2="190" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="190" x2="805" y2="190" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="965" y1="190" x2="990" y2="190" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data flow row -->
  <text x="515" y="270" text-anchor="middle" fill="#484f58" font-size="10">|</text>
  <text x="700" y="270" text-anchor="middle" fill="#484f58" font-size="10">|</text>
  <text x="885" y="270" text-anchor="middle" fill="#484f58" font-size="10">|</text>
  <text x="1070" y="270" text-anchor="middle" fill="#484f58" font-size="10">|</text>

  <!-- Data output boxes -->
  <rect x="450" y="280" width="130" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="515" y="300" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">metadata.json</text>
  <text x="515" y="316" text-anchor="middle" fill="#484f58" font-size="9">downloads/{platform}/</text>

  <rect x="635" y="280" width="130" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="700" y="300" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">transcripts/</text>
  <text x="700" y="316" text-anchor="middle" fill="#484f58" font-size="9">.json + .txt per video</text>

  <rect x="820" y="280" width="130" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="300" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">frames/</text>
  <text x="885" y="316" text-anchor="middle" fill="#484f58" font-size="9">frame_NNNN.jpg</text>

  <rect x="1005" y="280" width="130" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="1070" y="300" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">analysis/</text>
  <text x="1070" y="316" text-anchor="middle" fill="#484f58" font-size="9">4 JSON files</text>

  <!-- Data flow down arrows -->
  <line x1="515" y1="240" x2="515" y2="280" stroke="#30363d" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="700" y1="240" x2="700" y2="280" stroke="#30363d" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="885" y1="240" x2="885" y2="280" stroke="#30363d" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1070" y1="240" x2="1070" y2="280" stroke="#30363d" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Step 5: Upload section -->
  <rect x="435" y="360" width="715" height="90" rx="8" fill="url(#stepGrad)" stroke="url(#orangeGrad)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="435" y="360" width="715" height="24" rx="8" fill="#d29922" opacity="0.1"/>
  <text x="790" y="378" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700">STEP 5: UPLOAD TO GOOGLE DRIVE</text>

  <rect x="460" y="395" width="150" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="535" y="411" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">analysis/*.json</text>
  <text x="535" y="425" text-anchor="middle" fill="#484f58" font-size="9">topics, sentiment, etc.</text>

  <rect x="630" y="395" width="120" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="690" y="411" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">metadata.json</text>
  <text x="690" y="425" text-anchor="middle" fill="#484f58" font-size="9">76+ video index</text>

  <rect x="770" y="395" width="120" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="830" y="411" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">run log</text>
  <text x="830" y="425" text-anchor="middle" fill="#484f58" font-size="9">timestamped .log</text>

  <!-- Copy arrow to upload -->
  <rect x="920" y="395" width="210" height="40" rx="6" fill="#0d1117" stroke="url(#orangeGrad)" stroke-width="1.5"/>
  <text x="1025" y="411" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="600">upload/</text>
  <text x="1025" y="425" text-anchor="middle" fill="#8b949e" font-size="9">Google Drive Desktop sync</text>

  <line x1="890" y1="415" x2="920" y2="415" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Orchestration label -->
  <rect x="435" y="470" width="715" height="50" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="510" y="492" text-anchor="middle" fill="#8b949e" font-size="10">Orchestrated by:</text>
  <text x="680" y="492" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">update-pipeline.py</text>
  <text x="830" y="492" text-anchor="middle" fill="#8b949e" font-size="10">Triggered by:</text>
  <text x="970" y="492" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">run-update.bat</text>
  <text x="1090" y="492" text-anchor="middle" fill="#484f58" font-size="10">Task Scheduler</text>
  <text x="1090" y="506" text-anchor="middle" fill="#484f58" font-size="9">(optional)</text>

  <!-- ==================== OUTPUTS SECTION ==================== -->
  <rect x="30" y="625" width="1140" height="130" rx="12" fill="url(#localGrad)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="625" width="1140" height="30" rx="12" fill="#6c63ff" opacity="0.08"/>
  <text x="600" y="646" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">OUTPUTS</text>

  <!-- Google Drive -->
  <rect x="60" y="670" width="250" height="65" rx="8" fill="url(#stepGrad)" stroke="url(#orangeGrad)" stroke-width="1"/>
  <text x="185" y="693" text-anchor="middle" fill="#e3b341" font-size="13" font-weight="700">Google Drive</text>
  <text x="185" y="710" text-anchor="middle" fill="#8b949e" font-size="10">Analysis JSON + metadata + logs</text>
  <text x="185" y="724" text-anchor="middle" fill="#484f58" font-size="9">Auto-synced from upload/ folder</text>

  <!-- Dashboard -->
  <rect x="340" y="670" width="250" height="65" rx="8" fill="url(#stepGrad)" stroke="url(#accentGrad)" stroke-width="1"/>
  <text x="465" y="693" text-anchor="middle" fill="#b4a7ff" font-size="13" font-weight="700">Web dashboard</text>
  <text x="465" y="710" text-anchor="middle" fill="#8b949e" font-size="10">web/index.html (Chart.js)</text>
  <text x="465" y="724" text-anchor="middle" fill="#484f58" font-size="9">python -m http.server 8888</text>

  <!-- Monitoring report -->
  <rect x="620" y="670" width="250" height="65" rx="8" fill="url(#stepGrad)" stroke="url(#greenGrad)" stroke-width="1"/>
  <text x="745" y="693" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="700">Monitoring report</text>
  <text x="745" y="710" text-anchor="middle" fill="#8b949e" font-size="10">monitoring/latest-check.json</text>
  <text x="745" y="724" text-anchor="middle" fill="#484f58" font-size="9">Committed by remote trigger</text>

  <!-- Local logs -->
  <rect x="900" y="670" width="250" height="65" rx="8" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="1025" y="693" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Local logs</text>
  <text x="1025" y="710" text-anchor="middle" fill="#8b949e" font-size="10">logs/update_YYYY-MM-DD_HHMMSS.log</text>
  <text x="1025" y="724" text-anchor="middle" fill="#484f58" font-size="9">Console + file output</text>

  <!-- Output arrows -->
  <line x1="1025" y1="560" x2="185" y2="670" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <line x1="1070" y1="330" x2="465" y2="670" stroke="#6c63ff" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <line x1="200" y1="420" x2="745" y2="670" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>

  <!-- Stats bar -->
  <rect x="30" y="775" width="1140" height="50" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="130" y="805" text-anchor="middle" fill="#8b949e" font-size="11">76 videos</text>
  <text x="300" y="805" text-anchor="middle" fill="#8b949e" font-size="11">5 platforms</text>
  <text x="470" y="805" text-anchor="middle" fill="#8b949e" font-size="11">307 min content</text>
  <text x="650" y="805" text-anchor="middle" fill="#8b949e" font-size="11">6,143 frames</text>
  <text x="830" y="805" text-anchor="middle" fill="#8b949e" font-size="11">10 topics tracked</text>
  <text x="1030" y="805" text-anchor="middle" fill="#8b949e" font-size="11">YouTube + TikTok monitored</text>

  <!-- Dividers in stats -->
  <line x1="215" y1="785" x2="215" y2="815" stroke="#21262d" stroke-width="1"/>
  <line x1="390" y1="785" x2="390" y2="815" stroke="#21262d" stroke-width="1"/>
  <line x1="560" y1="785" x2="560" y2="815" stroke="#21262d" stroke-width="1"/>
  <line x1="740" y1="785" x2="740" y2="815" stroke="#21262d" stroke-width="1"/>
  <line x1="930" y1="785" x2="930" y2="815" stroke="#21262d" stroke-width="1"/>

  <!-- Footer -->
  <text x="600" y="860" text-anchor="middle" fill="#484f58" font-size="10">Mamdani Video Analysis Pipeline | Center for Cooperative Media | Montclair State University</text>
</svg>
